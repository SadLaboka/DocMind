services:
  redis:
    image: redis:8-alpine
    env_file:
      - .env
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - DocMind_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    env_file:
      - .env
    environment:
      - REDIS_HOSTS=local:redis:${REDIS_PORT:-6379}
    ports:
      - "${REDIS_COMMANDER_HOST:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - DocMind_network

  mongo_db:
    image: mongo:7
    restart: always
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-example}
    ports:
      - "${MONGO_PORT:-27017}:${MONGO_PORT:-27017}"
    networks:
      - DocMind_network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  seed-prompt:
    build: .
    command: [ "poetry", "run", "python", "scripts/seed_initial_prompt.py" ]
    env_file:
      - .env
    environment:
      - PYTHONPATH=/usr/src/app
    depends_on:
      mongo_db:
        condition: service_healthy
    networks:
      - DocMind_network

  stream:
    build: .
    command: ["poetry", "run", "python", "run_stream.py"]
    env_file:
      - .env
    environment:
      - PYTHONPATH=/usr/src/app
      - DB_HOST=main_db
      - RABBITMQ_HOST=rabbitmq
      - MONGO_HOST=mongo_db
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      main_db:
        condition: service_healthy
      mongo_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - DocMind_network

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:${RABBITMQ_PORT:-5672}"
      - "${RABBITMQ_PANEL_PORT:-15672}:${RABBITMQ_PANEL_PORT:-15672}"
    networks:
      - DocMind_network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 10s
      timeout: 5s
      retries: 5

  application:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONPATH=/usr/src/app
      - DB_HOST=main_db
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - SERVER_RELOAD=false
    command: ["poetry", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - DocMind_network
    ports:
      - "8000:8000"
    volumes:
      - temp_data:/usr/src/app/temp
    depends_on:
      rabbitmq:
        condition: service_healthy
      main_db:
        condition: service_healthy
      mongo_db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A src.worker.celery_app worker --loglevel=info
    volumes:
      - temp_data:/usr/src/app/temp
    env_file:
      - .env
    environment:
      - PYTHONPATH=/usr/src/app
    restart: always
    healthcheck:
      test: [ "CMD", "celery", "-A", "src.worker.celery_app", "inspect", "ping", "--timeout", "10" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    depends_on:
      rabbitmq:
        condition: service_healthy
      main_db:
        condition: service_healthy
      mongo_db:
        condition: service_healthy
    networks:
      - DocMind_network

  main_db:
    image: postgres:18.3-bookworm
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-postgres}
    ports:
      - "5432:5432"
    networks:
      - DocMind_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_NAME:-postgres} -U ${DB_USER:-postgres}" ]
      interval: 5s
      timeout: 20s
      start_period: 10s
      retries: 10

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONPATH=/usr/src/app
      - DB_HOST=main_db
    command: [ "poetry", "run", "alembic", "upgrade", "head" ]
    depends_on:
      main_db:
        condition: service_healthy
    networks:
      - DocMind_network

networks:
  DocMind_network:
    driver: bridge

volumes:
  temp_data:
