[project]
name = "docmind"
version = "0.1.0"
description = "Document analysis app"
authors = [
    {name = "SadLaboka",email = "jiutbuh@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi (>=0.136.1,<0.137.0)",
    "uvicorn (>=0.46.0,<0.47.0)",
    "pydantic-settings (>=2.14.1,<3.0.0)"
]

[tool.poetry]
packages = [{include = "docmind", from = "src"}]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
